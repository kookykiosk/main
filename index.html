<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kooky Kiosk</title>

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #ffffff;
  color: #111;
}

.container {
  max-width: 720px;
  margin: 0 auto;
  padding: 20px;
}

/* Header */
.header {
  text-align: center;
  font-size: 28px;
  font-weight: 700;
  margin: 40px 0;
}

/* Product List */
.product {
  display: flex;
  gap: 16px;
  align-items: center;
  padding: 16px 0;
}

.product img {
  width: 80px;
  height: 80px;
  border-radius: 10px;
  object-fit: cover;
}

.product-name {
  font-size: 16px;
  font-weight: 500;
}

.product-desc {
  font-size: 13px;
  color: #8a8a8a;
}

.divider {
  height: 1px;
  background: #eeeeee;
}

/* Sections */
.section {
  text-align: center;
  margin: 80px 0 40px;
  font-size: 14px;
  font-weight: 500;
}

/* Buttons */
.btn {
  display: block;
  width: 220px;
  margin: 10px auto;
  padding: 12px;
  background: #111;
  color: #fff;
  text-decoration: none;
  border-radius: 6px;
  font-size: 14px;
  transition: 0.2s;
}

.btn:hover {
  background: #333;
}

/* Contact */
.contact {
  text-align: center;
  color: #8a8a8a;
  font-size: 14px;
  line-height: 1.8;
}

/* Social */
.social {
  text-align: center;
  margin-top: 20px;
  font-size: 14px;
}

.social a {
  margin: 0 10px;
  color: #8a8a8a;
  text-decoration: none;
}

.social a:hover {
  color: #111;
}

/* Footer */
.footer {
  text-align: center;
  margin: 60px 0 20px;
  font-size: 12px;
  color: #aaa;
}
</style>
</head>

<body>

<div class="container">

  <!-- Header -->
  <div class="header">Kooky Kiosk</div>

  <!-- Product List (Dynamic Area) -->
  <div id="products"></div>

  <!-- Shop Section -->
  <div class="section">Shop</div>

  <a class="btn" href="https://shopee.com/YOUR_STORE" target="_blank">Shopee</a>
  <a class="btn" href="https://lazada.com/YOUR_STORE" target="_blank">Lazada</a>
  <a class="btn" href="https://tiktok.com/@YOUR_STORE" target="_blank">TikTok</a>

  <!-- Contact -->
  <div class="section">Contact</div>
  <div class="contact">
    WhatsApp: +60XXXXXXXXX<br>
    Email: hello@kookykiosk.com
  </div>

  <!-- Social -->
  <div class="social">
    <a href="#">Facebook</a>
    <a href="#">Instagram</a>
  </div>

  <!-- Footer -->
  <div class="footer">© Kooky Kiosk</div>

</div>

<!-- Google Sheets Integration -->
<script>
async function loadProducts() {
  const res = await fetch("YOUR_GOOGLE_SHEET_CSV_URL");
  const data = await res.text();

  const rows = data.split("\n").slice(1);
  const container = document.getElementById("products");

  rows.forEach((row, index) => {
    const cols = row.split(",");
    if (!cols[0]) return;

    const item = document.createElement("div");

    item.innerHTML = `
      <div class="product">
        <img src="${cols[1]}" alt="">
        <div>
          <div class="product-name">${cols[0]}</div>
          <div class="product-desc">${cols[2]}</div>
        </div>
      </div>
      <div class="divider"></div>
    `;

    container.appendChild(item);
  });
}

loadProducts();
</script>

</body>
</html>
