<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/images/logo.jpg" type="image/x-icon">
    <title>Kooky Kiosk | Premium Snacks</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FFFDF9; scroll-behavior: smooth; }
        .glass { background: rgba(255, 253, 249, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0, 0, 0, 0.03); }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        .animate-in { opacity: 0; transform: translateY(20px); animation: fadeInUp 0.6s ease forwards; }
    </style>
</head>
<body class="text-gray-900 antialiased">

    <header class="sticky top-0 z-50 glass">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="/images/logo.jpg" alt="Logo" class="w-12 h-12 rounded-full shadow-sm object-cover bg-white">
                <div>
                    <h1 class="font-bold text-lg tracking-tight leading-none text-slate-900">KOOKY KIOSK</h1>
                    <p class="text-[8px] text-gray-400 tracking-widest uppercase font-bold mt-1">Reg: 202603078107 (SA0650753-V)</p>
                </div>
            </div>
            <a href="https://wa.me/0179056448" class="bg-[#121212] hover:bg-green-600 text-white px-5 py-2.5 rounded-full text-[10px] font-bold transition-all duration-300 shadow-lg uppercase tracking-wider">
                WhatsApp
            </a>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-12">
        <section class="text-center mb-12">
            <h2 class="text-4xl md:text-5xl font-bold mb-4 tracking-tight text-slate-900 leading-tight">Elevated snacking.</h2>
            <p class="text-gray-500 max-w-sm mx-auto text-sm mb-8">Available on Shopee, Lazada & TikTok Shop.</p>
            
            <div class="relative max-w-md mx-auto mb-10">
                <input type="text" id="searchInput" onkeyup="filterProducts()" placeholder="Search for your favorite snack..." 
                       class="w-full px-6 py-4 rounded-2xl border border-gray-100 bg-white shadow-sm focus:outline-none focus:ring-2 focus:ring-orange-100 transition-all text-sm">
                <div class="absolute right-4 top-4 text-gray-300">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </div>
            </div>

            <div class="flex flex-wrap justify-center gap-2 mb-16">
                <a href="https://shopee.com.my/shop/42720713" target="_blank" class="px-5 py-2 bg-white border border-gray-100 rounded-xl hover:shadow-md transition-all text-[11px] font-bold">SHOPEE MY</a>
                <a href="https://shopee.sg/kookykiosk.sg" target="_blank" class="px-5 py-2 bg-white border border-gray-100 rounded-xl hover:shadow-md transition-all text-[11px] font-bold">SHOPEE SG</a>
                <a href="https://www.lazada.com.my/shop/kooky-kiosk" target="_blank" class="px-5 py-2 bg-white border border-gray-100 rounded-xl hover:shadow-md transition-all text-[11px] font-bold">LAZADA</a>
                <a href="https://vt.tiktok.com/ZSHYUs7Jq/" target="_blank" class="px-5 py-2 bg-white border border-gray-100 rounded-xl hover:shadow-md transition-all text-[11px] font-bold text-pink-500">TIKTOK</a>
            </div>
        </section>

        <div id="product-container" class="grid grid-cols-2 md:grid-cols-3 gap-6 md:gap-10">
            <div class="bg-white h-64 rounded-[2rem] animate-pulse border border-gray-50"></div>
            <div class="bg-white h-64 rounded-[2rem] animate-pulse border border-gray-50"></div>
            <div class="bg-white h-64 rounded-[2rem] animate-pulse border border-gray-50"></div>
        </div>
    </main>

    <footer class="py-16 text-center border-t border-gray-50">
        <p class="text-[10px] text-gray-400 font-bold tracking-[0.3em] uppercase">Kooky Kiosk &copy; 2026</p>
    </footer>

    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTvHOdCQEWzQMpbPfPGYahxvGt56y2xHNQkEZtT-wJ9tuQC08D093TLj0W6vOvLwsGWNFRAHPhkGUV3/pub?output=csv';

        async function loadProducts() {
            try {
                const response = await fetch(sheetUrl);
                const data = await response.text();
                const rows = data.split('\n').slice(1);
                const container = document.getElementById('product-container');
                container.innerHTML = ''; 

                rows.forEach((row, index) => {
                    const columns = row.match(/(".*?"|[^",\r\n]+)(?=\s*,|\s*$)/g);
                    if (columns && columns.length >= 2) {
                        const name = columns[0].replace(/"/g, "");
                        const img = columns[1].replace(/"/g, "");

                        container.innerHTML += `
                            <div class="product-item group bg-white rounded-[2rem] p-4 border border-slate-50 transition-all duration-700 hover:shadow-xl hover:-translate-y-1 animate-in" style="animation-delay: ${index * 0.05}s">
                                <div class="relative overflow-hidden rounded-[1.5rem] bg-slate-50 aspect-square">
                                    <img src="${img}" class="w-full h-full object-cover transition-transform duration-[2000ms] group-hover:scale-110" alt="${name}">
                                </div>
                                <div class="mt-6 text-center">
                                    <h3 class="product-name text-sm md:text-base font-bold text-slate-800 leading-tight px-2">${name}</h3>
                                    <p class="text-[9px] text-slate-300 uppercase tracking-widest mt-3 font-bold">Signature</p>
                                </div>
                            </div>
                        `;
                    }
                });
            } catch (error) {
                console.error("Error loading sheet");
            }
        }

        function filterProducts() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const items = document.getElementsByClassName('product-item');
            
            for (let i = 0; i < items.length; i++) {
                const name = items[i].getElementsByClassName('product-name')[0].innerText.toLowerCase();
                if (name.includes(input)) {
                    items[i].style.display = "";
                } else {
                    items[i].style.display = "none";
                }
            }
        }

        loadProducts();
    </script>
</body>
</html>
