<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kooky Kiosk | Snacks</title>
    <style>
        :root {
            --bg: #fafafa;
            --text: #222;
            --accent: #000;
            --card-bg: #ffffff;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        
        /* Header Section */
        .header { text-align: center; margin-bottom: 40px; }
        .logo { width: 100px; height: 100px; border-radius: 50%; background: #eee; margin-bottom: 15px; object-fit: cover; }
        h1 { margin: 10px 0 5px; letter-spacing: -1px; }
        .reg-no { font-size: 0.85rem; color: #666; text-transform: uppercase; }

        /* Social Links */
        .social-links { display: flex; gap: 15px; margin: 25px 0; flex-wrap: wrap; justify-content: center; }
        .social-links a { text-decoration: none; padding: 10px 20px; border: 1px solid var(--accent); border-radius: 30px; color: var(--accent); font-weight: 500; font-size: 14px; transition: 0.3s; }
        .social-links a:hover { background: var(--accent); color: white; }

        /* Product List */
        #product-container { width: 100%; max-width: 500px; }
        .product-card { background: var(--card-bg); border: 1px solid #eaeaea; border-radius: 12px; padding: 15px; margin-bottom: 15px; display: flex; align-items: center; gap: 15px; }
        .product-img { width: 70px; height: 70px; border-radius: 8px; object-fit: cover; }
        .product-info h3 { margin: 0; font-size: 16px; }
        .product-info p { margin: 5px 0 0; font-size: 13px; color: #666; line-height: 1.4; }

        .whatsapp-btn { margin-top: 30px; color: #25D366; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <img src="YOUR_LOGO_URL_HERE" alt="Kooky Kiosk Logo" class="logo">
        <h1>Kooky Kiosk</h1>
        <div class="reg-no">Reg: [Your Registration Number]</div>
    </div>

    <div class="social-links">
        <a href="YOUR_SHOPEE_URL" target="_blank">Shopee</a>
        <a href="YOUR_LAZADA_URL" target="_blank">Lazada</a>
        <a href="YOUR_TIKTOK_URL" target="_blank">TikTok</a>
    </div>

    <div id="product-container">
        <p style="text-align:center">Loading snacks...</p>
    </div>

    <a href="https://wa.me/YOUR_PHONE_NUMBER" class="whatsapp-btn">Contact us on WhatsApp</a>

    <script>
        // REPLACE THIS with your Published Google Sheet CSV Link
        const sheetUrl = 'YOUR_PUBLISHED_CSV_LINK_HERE';

        async function loadProducts() {
            try {
                const response = await fetch(sheetUrl);
                const data = await response.text();
                const rows = data.split('\n').slice(1); // Skip header row
                
                const container = document.getElementById('product-container');
                container.innerHTML = ''; // Clear loading text

                rows.forEach(row => {
                    const columns = row.split(',');
                    if (columns.length >= 3) {
                        const name = columns[0];
                        const img = columns[1];
                        const desc = columns[2];

                        container.innerHTML += `
                            <div class="product-card">
                                <img src="${img}" class="product-img" alt="${name}">
                                <div class="product-info">
                                    <h3>${name}</h3>
                                    <p>${desc}</p>
                                </div>
                            </div>
                        `;
                    }
                });
            } catch (error) {
                console.error("Error loading sheet:", error);
            }
        }

        loadProducts();
    </script>
</body>
</html>
